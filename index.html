<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameRating - AAA 게임 큐레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { @apply bg-purple-600 text-white; }
        .tab-inactive { @apply bg-gray-800 text-gray-400 hover:bg-gray-700; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-4xl font-bold mb-4 text-purple-400">🎮 GameRating</h1>
        
        <div class="max-w-md mx-auto mb-8">
            <input type="text" id="searchInput" placeholder="게임 제목 검색..." 
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <div class="flex justify-center gap-4 mb-8">
            <button onclick="filterGames('recent')" id="tab-recent" class="px-6 py-2 rounded-full tab-active">최근 2년 신작</button>
            <button onclick="filterGames('upcoming')" id="tab-upcoming" class="px-6 py-2 rounded-full tab-inactive">발매 예정작</button>
        </div>
    </header>

    <main id="gameGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </main>

    <script>
        // 1 & 2. 데이터 구성 (최근 2년 AAA 게임 + 예정작)
        const games = [
            { title: "엘든 링: 황금 나무의 그림자", date: "2024.06.21", score: 95, type: "recent", lang: "KO", trailer: "https://www.youtube.com/results?search_query=Elden+Ring+Shadow+of+the+Erdtree+trailer", img: "https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?w=800" },
            { title: "검은 신화: 오공", date: "2024.08.20", score: 81, type: "recent", lang: "KO", trailer: "https://www.youtube.com/results?search_query=Black+Myth+Wukong+trailer", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800" },
            { title: "젤다의 전설 티어스 오브 더 킹덤", date: "2023.05.12", score: 96, type: "recent", lang: "KO", trailer: "https://www.youtube.com/results?search_query=Zelda+Tears+of+the+Kingdom+trailer", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800" },
            { title: "몬스터 헌터 와일즈", date: "2025 예정", score: "TBD", type: "upcoming", lang: "KO", trailer: "https://www.youtube.com/results?search_query=Monster+Hunter+Wilds+trailer", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800" },
            { title: "GTA 6", date: "2025 예정", score: "TBD", type: "upcoming", lang: "KO", trailer: "https://www.youtube.com/results?search_query=GTA+6+trailer", img: "https://images.unsplash.com/photo-1533236897111-3e94666b2edf?w=800" }
        ];

        function renderGames(filterType = 'recent', searchTerm = '') {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            const filtered = games.filter(g => {
                const matchesTab = g.type === filterType;
                const matchesSearch = g.title.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesTab && matchesSearch;
            });

            filtered.forEach(game => {
                grid.innerHTML += `
                    <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 hover:scale-105 transition shadow-lg">
                        <img src="${game.img}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <h2 class="text-xl font-bold">${game.title}</h2>
                                <span class="bg-yellow-500 text-black font-bold px-2 py-1 rounded text-sm">${game.score}</span>
                            </div>
                            <p class="text-sm text-gray-400 mb-4">발매일: ${game.date}</p>
                            <div class="flex gap-2 mb-6">
                                <span class="bg-green-600 text-xs px-2 py-1 rounded text-white font-bold">한국어 지원 ✅</span>
                            </div>
                            <a href="${game.trailer}" target="_blank" class="block w-full text-center bg-red-600 py-2 rounded hover:bg-red-700 transition font-bold">📺 트레일러 보기</a>
                        </div>
                    </div>
                `;
            });
        }

        // 5. 검색 기능
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const currentTab = document.getElementById('tab-recent').classList.contains('tab-active') ? 'recent' : 'upcoming';
            renderGames(currentTab, e.target.value);
        });

        // 탭 전환 기능
        function filterGames(type) {
            document.getElementById('tab-recent').className = type === 'recent' ? 'px-6 py-2 rounded-full tab-active' : 'px-6 py-2 rounded-full tab-inactive';
            document.getElementById('tab-upcoming').className = type === 'upcoming' ? 'px-6 py-2 rounded-full tab-active' : 'px-6 py-2 rounded-full tab-inactive';
            renderGames(type, document.getElementById('searchInput').value);
        }

        // 초기 실행
        renderGames();
    </script>
</body>
</html>
