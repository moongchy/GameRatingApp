<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOTY AAA Game Lounge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --single-color: #10b981;
            --coop-color: #f59e0b;
            --multi-color: #6366f1;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: var(--text-color);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .card-content {
            padding: 15px;
            flex-grow: 1;
        }
        .card-title {
            font-size: 1.15rem;
            font-weight: bold;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .platforms {
            font-size: 0.8rem;
            color: #3b82f6;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .score {
            background: #22c55e;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .score.tbd {
            background: #475569;
        }
        .released {
            color: var(--text-muted);
        }
        .tag-container {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge.singleplayer { background-color: rgba(16, 185, 129, 0.15); color: var(--single-color); border: 1px solid var(--single-color); }
        .badge.co-op { background-color: rgba(245, 158, 11, 0.15); color: var(--coop-color); border: 1px solid var(--coop-color); }
        .badge.multiplayer { background-color: rgba(99, 102, 241, 0.15); color: var(--multi-color); border: 1px solid var(--multi-color); }
        
        /* 🎯 외부 링크 영역 레이아웃 및 크기 업그레이드 */
        .card-links {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 14px 0;
            background-color: rgba(0, 0, 0, 0.4); /* 조금 더 어둡게 깔아서 대비감 증가 */
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .icon-link {
            color: #a0aec0; /* 기본 아이콘 색상을 더 밝게 보정 */
            font-size: 1.5rem; /* 아이콘 크기를 기존보다 대폭 확대 */
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        /* 마우스 올렸을 때 배경 슬쩍 들어오면서 선명한 브랜드 컬러 활성화 */
        .icon-link:hover {
            transform: scale(1.15);
            background-color: rgba(255, 255, 255, 0.05);
        }
        .icon-link:hover.steam { color: #66c0f4; } /* 스팀 시그니처 연한 파랑 */
        .icon-link:hover.youtube { color: #ff0000; } /* 유튜브 레드 */
        .icon-link:hover.namu { color: #00a495; } /* 나무위키 민트 */

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 50px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 최신 GOTY 대작 라인업</h1>
        <div class="grid" id="game-grid">
            <div class="loading">게임을 불러오는 중입니다...</div>
        </div>
    </div>

    <script>
        // 🎯 1. '플레이' 단어를 제외하고 깔끔하게 한글 매핑 수정
        function translateTagName(slug) {
            const mapper = {
                'singleplayer': '싱글',
                'co-op': '협동',
                'multiplayer': '멀티'
            };
            return mapper[slug] || '싱글';
        }

        async function fetchGames() {
            const grid = document.getElementById('game-grid');
            try {
                const res = await fetch('/api/games');
                const data = await res.json();

                if (!data.results || data.results.length === 0) {
                    grid.innerHTML = '<div class="loading">표시할 AAA 게임이 없습니다.</div>';
                    return;
                }

                grid.innerHTML = '';

                data.results.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    const scoreClass = game.metacritic === 'TBD' ? 'score tbd' : 'score';

                    const tagsHtml = game.tags && game.tags.length > 0 
                        ? game.tags.map(tag => `<span class="badge ${tag.slug}">${translateTagName(tag.slug)}</span>`).join('')
                        : '<span class="badge singleplayer">싱글</span>';

                    const platformNames = game.parent_platforms 
                        ? game.parent_platforms.map(p => p.platform.name).join(', ')
                        : 'PC, Console';

                    const encodedName = encodeURIComponent(game.name);
                    const steamUrl = `https://store.steampowered.com/search/?term=${encodedName}`;
                    const youtubeUrl = `https://www.youtube.com/results?search_query=${encodedName}+official+trailer`;
                    const namuUrl = `https://namu.wiki/w/${encodedName}`;

                    card.innerHTML = `
                        <div>
                            <img class="card-img" src="${game.background_image || 'https://via.placeholder.com/300x180'}" alt="${game.name}">
                            <div class="card-content">
                                <div class="card-title" title="${game.name}">${game.name}</div>
                                <div class="platforms"><i class="fa-solid fa-gamepad"></i> ${platformNames}</div>
                                <div class="meta-info">
                                    <span class="released">${game.released || '출시일 미정'}</span>
                                    <span class="${scoreClass}">${game.metacritic}</span>
                                </div>
                                <div class="tag-container">
                                    ${tagsHtml}
                                </div>
                            </div>
                        </div>
                        <div class="card-links">
                            <a href="${steamUrl}" target="_blank" class="icon-link steam" title="스팀 페이지"><i class="fa-brands
