<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOTY AAA Game Lounge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎮 최신 GOTY 대작 라인업</h1>
        <div class="grid" id="game-grid">
            <div class="loading">게임을 불러오는 중입니다...</div>
        </div>
    </div>

    <script>
        // 🎯 1. '플레이' 단어를 제외하고 깔끔하게 한글 매핑 수정
        function translateTagName(slug) {
            const mapper = {
                'singleplayer': '싱글',
                'co-op': '협동',
                'multiplayer': '멀티'
            };
            return mapper[slug] || '싱글';
        }

        async function fetchGames() {
            const grid = document.getElementById('game-grid');
            try {
                const res = await fetch('/api/games');
                const data = await res.json();

                if (!data.results || data.results.length === 0) {
                    grid.innerHTML = '<div class="loading">표시할 AAA 게임이 없습니다.</div>';
                    return;
                }

                grid.innerHTML = '';

                data.results.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    const scoreClass = game.metacritic === 'TBD' ? 'score tbd' : 'score';

                    const tagsHtml = game.tags && game.tags.length > 0 
                        ? game.tags.map(tag => `<span class="badge ${tag.slug}">${translateTagName(tag.slug)}</span>`).join('')
                        : '<span class="badge singleplayer">싱글</span>';

                    const platformNames = game.parent_platforms 
                        ? game.parent_platforms.map(p => p.platform.name).join(', ')
                        : 'PC, Console';

                    const encodedName = encodeURIComponent(game.name);
                    const steamUrl = `https://store.steampowered.com/search/?term=${encodedName}`;
                    const youtubeUrl = `https://www.youtube.com/results?search_query=${encodedName}+official+trailer`;
                    const namuUrl = `https://namu.wiki/w/${encodedName}`;

                    card.innerHTML = `
                        <div>
                            <img class="card-img" src="${game.background_image || 'https://via.placeholder.com/300x180'}" alt="${game.name}">
                            <div class="card-content">
                                <div class="card-title" title="${game.name}">${game.name}</div>
                                <div class="platforms"><i class="fa-solid fa-gamepad"></i> ${platformNames}</div>
                                <div class="meta-info">
                                    <span class="released">${game.released || '출시일 미정'}</span>
                                    <span class="${scoreClass}">${game.metacritic}</span>
                                </div>
                                <div class="tag-container">
                                    ${tagsHtml}
                                </div>
                            </div>
                        </div>
                        <div class="card-links">
                            <a href="${steamUrl}" target="_blank" class="icon-link steam" title="스팀 페이지"><i class="fa-brands
