<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameRating LIVE - AAA Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f1115] text-white min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-5xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-green-400 to-blue-600">GameRating LIVE</h1>
        <p id="status" class="text-gray-500 font-mono text-sm uppercase">키 파일 확인 중...</p>
        
        <div class="max-w-md mx-auto my-8">
            <input type="text" id="searchInput" placeholder="게임 제목으로 실시간 검색..." 
                class="w-full bg-gray-800/50 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 backdrop-blur-sm transition">
        </div>

        <div class="flex justify-center gap-4 mb-8">
            <button onclick="switchTab('recent')" id="tab-recent" class="px-8 py-3 rounded-xl bg-blue-600 font-bold transition shadow-lg shadow-blue-500/20">최신 게임 (최근 1년)</button>
            <button onclick="switchTab('upcoming')" id="tab-upcoming" class="px-8 py-3 rounded-xl bg-gray-800 text-gray-400 hover:bg-gray-700 font-bold transition">발매 예정작</button>
        </div>
    </header>

    <main id="gameGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </main>

    <script>
        let RAWG_KEY = '';
        let STEAM_KEY = '';
        let allFetchedGames = []; 
        let currentTab = 'recent'; 

        // 1. 플랫폼 중복 배지 제거 해결
        function getPlatformBadges(platforms) {
            if (!platforms) return '';
            const badgeSet = new Set();
            platforms.forEach(p => {
                const name = p.platform.name.toLowerCase();
                if (name.includes('pc')) badgeSet.add(`<span class="bg-gray-700/60 text-gray-200 text-[10px] px-2 py-0.5 rounded border border-gray-600 font-bold">PC</span>`);
                if (name.includes('playstation')) badgeSet.add(`<span class="bg-blue-600/20 text-blue-400 text-[10px] px-2 py-0.5 rounded border border-blue-500/30 font-bold">PS5</span>`);
                if (name.includes('xbox')) badgeSet.add(`<span class="bg-green-600/20 text-green-400 text-[10px] px-2 py-0.5 rounded border border-green-500/30 font-bold">Xbox</span>`);
                if (name.includes('nintendo')) badgeSet.add(`<span class="bg-red-600/20 text-red-400 text-[10px] px-2 py-0.5 rounded border border-red-500/30 font-bold">Switch</span>`);
            });
            return Array.from(badgeSet).join(' ');
        }

        // api.txt 파싱 및 통합 로드
        async function initSite() {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch('./api.txt');
                if (!response.ok) throw new Error();
