<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameRating Live - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f1115] text-white min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-5xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600">GameRating LIVE</h1>
        <p id="liveStatus" class="text-gray-500 animate-pulse font-mono text-sm">● STEAM 실시간 데이터 동기화 중...</p>
    </header>

    <main id="gameGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center py-20 text-gray-600 font-bold">데이터를 불러오는 중입니다...</div>
    </main>

    <script>
        // 스팀 실시간 데이터를 가져오는 함수
        async function fetchLiveGames() {
            try {
                // 스팀의 '인기 신작' 카테고리 데이터를 가져옵니다. 
                // 브라우저 직접 호출 제한을 피하기 위해 올인원 프록시(allorigins)를 사용합니다.
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://store.steampowered.com/api/featuredcategories')}`);
                const data = await response.json();
                const steamData = JSON.parse(data.contents);

                // 'new_releases' (신규 출시) 섹션의 게임들을 추출
                const liveGames = steamData.new_releases.items.slice(0, 9); // 상위 9개만
                renderGames(liveGames);
                document.getElementById('liveStatus').innerText = `● 2026년 5월 16일 실시간 업데이트 완료`;
                document.getElementById('liveStatus').classList.remove('animate-pulse');
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('liveStatus').innerText = "● 데이터 연결 실패 (새로고침 해주세요)";
            }
        }

        function renderGames(items) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            items.forEach(game => {
                const steamLink = `https://store.steampowered.com/app/${game.id}`;
                const namuLink = `https://namu.wiki/w/${encodeURIComponent(game.name)}`;
                
                grid.innerHTML += `
                    <div class="bg-[#1a1d23] rounded-3xl overflow-hidden border border-gray-800 hover:border-blue-500/50 transition-all duration-500 shadow-2xl group">
                        <div class="relative overflow-hidden">
                            <img src="${game.large_capsule_image}" class="w-full h-52 object-cover group-hover:scale-110 transition duration-700" alt="${game.name}">
                            <div class="absolute top-4 right-4 bg-blue-600 text-white font-black px-3 py-1 rounded-xl text-xs">
                                ${game.final_price > 0 ? (game.final_price/100).toLocaleString() + '원' : 'FREE'}
                            </div>
                        </div>
                        <div class="p-8">
                            <h2 class="text-xl font-bold mb-4 line-clamp-1 group-hover:text-blue-400 transition">${game.name}</h2>
                            
                            <div class="grid grid-cols-3 gap-3">
                                <a href="${steamLink}" target="_blank" class="flex flex-col items-center justify-center gap-2 bg-[#171a21] hover:bg-[#2a475e] py-3 rounded-2xl transition group/btn">
                                    <img src="https://cdn.simpleicons.org/steam/white" class="w-5 h-5 group-hover/btn:scale-110 transition">
                                    <span class="text-[10px] font-black">STEAM</span>
                                </a>
                                <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(game.name + ' trailer')}" target="_blank" class="flex flex-col items-center justify-center gap-2 bg-[#282828] hover:bg-[#ff0000] py-3 rounded-2xl transition group/btn">
                                    <img src="https://cdn.simpleicons.org/youtube/white" class="w-5 h-5 group-hover/btn:scale-110 transition">
                                    <span class="text-[10px] font-black">TRAILER</span>
                                </a>
                                <a href="${namuLink}" target="_blank" class="flex flex-col items-center justify-center gap-2 bg-[#00a495] hover:bg-[#00c4b5] py-3 rounded-2xl transition group/btn">
                                    <i data-lucide="book-text" class="w-5 h-5 group-hover/btn:scale-110 transition"></i>
                                    <span class="text-[10px] font-black">WIKI</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        window.onload = fetchLiveGames;
    </script>
</body>
</html>
